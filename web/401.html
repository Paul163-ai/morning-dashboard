<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 2rem;
            max-width: 380px;
            width: 100%;
        }
        .icon { font-size: 2.5rem; margin-bottom: 1rem; }
        h1 { font-size: 1.25rem; margin-bottom: 0.75rem; color: #fff; }
        p { color: #a0a0c0; line-height: 1.6; margin-bottom: 0.75rem; font-size: 0.95rem; }
        p:last-child { margin-bottom: 0; }
        .steps {
            background: #0f3460;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin: 1rem 0;
            text-align: left;
        }
        .steps p { color: #e0e0e0; margin-bottom: 0; }
        .url-box {
            font-family: monospace;
            background: #0f3460;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #e94560;
            word-break: break-all;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon" id="icon">🌐</div>
        <h1 id="heading">Morning Dashboard</h1>
        <div id="message"></div>
    </div>

    <script>
        var ua = navigator.userAgent;
        var isAndroid = /Android/i.test(ua);
        var isiOS = /iPhone|iPad|iPod/i.test(ua);

        var inAppApps = [
            { name: 'WhatsApp',   pattern: /WhatsApp/i },
            { name: 'Facebook',   pattern: /FBAN|FBAV|FB_IAB/i },
            { name: 'Instagram',  pattern: /Instagram/i },
            { name: 'Twitter',    pattern: /Twitter/i },
            { name: 'LinkedIn',   pattern: /LinkedInApp/i },
            { name: 'Snapchat',   pattern: /Snapchat/i },
            { name: 'TikTok',     pattern: /BytedanceWebview|musical_ly|TikTok/i },
            { name: 'WeChat',     pattern: /MicroMessenger/i },
        ];

        var detectedApp = null;
        for (var i = 0; i < inAppApps.length; i++) {
            if (inAppApps[i].pattern.test(ua)) {
                detectedApp = inAppApps[i].name;
                break;
            }
        }

        var msg = document.getElementById('message');

        if (detectedApp) {
            document.getElementById('heading').textContent = 'Open in your browser';
            var instruction;
            if (isAndroid) {
                instruction = 'Tap <strong>&#8942;</strong> (top-right menu) then <strong>"Open in Chrome"</strong>.';
            } else if (isiOS) {
                instruction = 'Tap the <strong>share icon</strong> or <strong>&#8943;</strong>, then choose <strong>"Open in Safari"</strong>.';
            } else {
                instruction = 'Use the menu in <strong>' + detectedApp + '</strong> to open this link in your browser.';
            }
            msg.innerHTML =
                '<p><strong>' + detectedApp + '</strong>’s browser doesn’t support the login prompt.</p>' +
                '<div class="steps"><p>' + instruction + '</p></div>' +
                '<p>Or copy this address into your browser:</p>' +
                '<div class="url-box">' + (window.location.origin + '/') + '</div>';
        } else {
            msg.innerHTML =
                '<p>You need to log in to access Morning Dashboard.</p>' +
                '<p>Your browser should have shown a login prompt &mdash; try refreshing the page.</p>';
        }
    </script>
</body>
</html>
